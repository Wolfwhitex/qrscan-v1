<!DOCTYPE html>

<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Redeem System</title>

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        :root {

            --primary: #4f46e5;

            --primary-hover: #4338ca;

            --bg-main: #f8fafc;

            --text-dark: #0f172a;

            --text-muted: #64748b;

        }



        body { 

            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 

            background-color: var(--bg-main); 

            display: flex; 

            flex-direction: column; 

            align-items: center; 

            justify-content: center; 

            min-height: 100vh; 

            margin: 0; 

            padding: 16px; 

            box-sizing: border-box; 

        }



        .card { 

            background-color: white; 

            padding: 32px 24px; 

            width: 100%; 

            max-width: 420px; 

            margin: 0 auto;

            text-align: center; 

            border-radius: 24px; 

            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);

            border: 1px solid #f1f5f9;

            box-sizing: border-box;

        }



        h1 { 

            font-size: 1.5rem; 

            font-weight: 800; 

            color: var(--text-dark); 

            margin-top: 0; 

            margin-bottom: 6px; 

            letter-spacing: -0.025em;

        }



        p.subtitle { 

            font-size: 0.875rem; 

            color: var(--text-muted); 

            margin-bottom: 28px; 

            font-weight: 500;

        }



        /* Area Scanner Custom Frame */

        #reader-wrapper {

            position: relative;

            width: 100%;

            aspect-ratio: 1/1;

            margin-bottom: 20px;

            border-radius: 16px;

            overflow: hidden;

            background-color: #000;

        }



        #reader { 

            width: 100% !important; 

            height: 100% !important;

            border: none !important; 

        }



        #reader img { display: none !important; }

        #reader button { display: none !important; }



        /* Tombol Utama */

        .btn-primary { 

            background-color: var(--primary); 

            color: white; 

            border: none; 

            padding: 14px 24px; 

            font-weight: 700; 

            border-radius: 14px; 

            cursor: pointer; 

            font-size: 1rem; 

            width: 100%; 

            margin-bottom: 10px; 

            transition: all 0.2s ease;

            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);

        }



        .btn-primary:hover { 

            background-color: var(--primary-hover); 

            transform: translateY(-1px);

            box-shadow: 0 6px 16px rgba(79, 70, 229, 0.25);

        }



        .btn-primary:active {

            transform: translateY(1px);

        }



        .hidden { display: none !important; }



        /* Spinner Loading Modern */

        #loading-container {

            display: none;

            padding: 30px 0;

        }



        .spinner {

            width: 40px;

            height: 40px;

            border: 4px solid #e2e8f0;

            border-top: 4px solid var(--primary);

            border-radius: 50%;

            margin: 0 auto 16px auto;

            animation: spin 0.8s linear infinite;

        }



        #loading-msg { 

            color: var(--text-dark); 

            font-weight: 600; 

            font-size: 0.95rem;

        }



        @keyframes spin {

            0% { transform: rotate(0deg); }

            100% { transform: rotate(360deg); }

        }



        /* Desain Kotak Hasil Scan */

        #result-box { 

            text-align: left; 

            padding: 20px; 

            border-radius: 16px; 

            display: none; 

            margin-top: 10px;

            animation: slideUp 0.3s ease-out;

        }



        @keyframes slideUp {

            from { transform: translateY(10px); opacity: 0; }

            to { transform: translateY(0); opacity: 1; }

        }



        #result-box h2 { 

            font-size: 0.85rem; 

            text-transform: uppercase; 

            letter-spacing: 0.05em; 

            margin-top: 0; 

            margin-bottom: 4px;

            color: inherit;

            opacity: 0.8;

        }



        #scanned-code { 

            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; 

            font-weight: 700; 

            font-size: 1.15rem; 

            word-break: break-all; 

            margin: 0 0 12px 0;

        }



        #scan-status { 

            font-size: 0.95rem; 

            line-height: 1.5;

            margin: 0; 

            font-weight: 500;

        }



        /* Variasi Warna Kartu Status */

        #result-box.success { background-color: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }

        #result-box.already { background-color: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }

        #result-box.notfound { background-color: #fffbeb; border: 1px solid #fde68a; color: #92400e; }

        #result-box.error { background-color: #f8fafc; border: 1px solid #e2e8f0; color: #334155; }



        /* Tombol Reset / Scan Lagi */

        #reset-btn { 

            background-color: #f1f5f9; 

            border: none; 

            color: #475569; 

            padding: 12px 20px; 

            border-radius: 12px; 

            width: 100%; 

            margin-top: 20px; 

            cursor: pointer; 

            font-weight: 700; 

            font-size: 0.95rem;

            transition: background 0.2s;

        }



        #reset-btn:hover { background-color: #e2e8f0; color: #1e293b; }



        /* Log Error Kamera */

        #error-log { 

            color: #991b1b; 

            font-size: 0.85rem; 

            text-align: left; 

            background: #fef2f2; 

            padding: 14px; 

            border-radius: 12px; 

            margin-top: 10px; 

            display: none; 

            word-break: break-all;

            border: 1px solid #fecaca;

        }

    </style>

</head>

<body>



    <div class="card">

        <h1>Redeem System</h1>

        <p class="subtitle">Koneksi Terhubung ke Google Sheets</p>

        

        <button id="start-camera-btn" class="btn-primary">Aktifkan Kamera</button>



        <div id="reader-wrapper" class="hidden">

            <div id="reader"></div>

        </div>

        

        <div id="error-log"></div>



        <div id="loading-container">

            <div class="spinner"></div>

            <div id="loading-msg">Memeriksa Data...</div>

        </div>



        <div id="result-box">

            <h2>Kode Voucher</h2>

            <p id="scanned-code"></p>

            <p id="scan-status"></p>

            <button id="reset-btn">Scan Voucher Lain</button>

        </div>

    </div>



    <script>

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwoklvs9MQkVxnJvybE9tGz82GcNeS_m700llQQUFuUIy8IDu5P3pNs0Cr5s3MrcBQfWg/exec";



        let html5QrCodeScanner;

        const startBtn = document.getElementById('start-camera-btn');

        const readerWrapper = document.getElementById('reader-wrapper');

        const errorLog = document.getElementById('error-log');

        const loadingContainer = document.getElementById('loading-container');



        // Mengaktifkan Kamera

        startBtn.addEventListener('click', () => {

            startBtn.classList.add('hidden');

            readerWrapper.classList.remove('hidden');

            errorLog.style.display = 'none';



            html5QrCodeScanner = new Html5QrcodeScanner("reader", { 

                fps: 10, 

                qrbox: { width: 230, height: 230 },

                rememberLastUsedCamera: true,

                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]

            });

            

            html5QrCodeScanner.render(onScanSuccess, onScanError);

        });



        // Ketika QR code berhasil dibaca kamera

        function onScanSuccess(decodedText) {

            html5QrCodeScanner.clear();

            

            loadingContainer.style.display = 'block';

            readerWrapper.classList.add('hidden');



            fetch(`${WEB_APP_URL}?code=${encodeURIComponent(decodedText)}`)

                .then(response => response.json())

                .then(data => {

                    loadingContainer.style.display = 'none';

                    const resultBox = document.getElementById('result-box');

                    const scannedCodeElem = document.getElementById('scanned-code');

                    const statusElem = document.getElementById('scan-status');



                    resultBox.style.display = 'block';

                    scannedCodeElem.innerText = decodedText;



                    if (data.status === "SUCCESS") {
                        resultBox.className = "success";
                        statusElem.innerHTML = data.message;
                    } else if (data.status === "ALREADY_REDEEMED") {
                        resultBox.className = "already";
                        statusElem.innerHTML = data.message;
                    } else if (data.status === "EXPIRED") { // <--- TAMBAHKAN BLOK INI
                        resultBox.className = "already";    // Kita pakai warna merah kartunya 'already' biar kontras peringatan
                        statusElem.innerHTML = data.message;
                    } else if (data.status === "NOT_FOUND") {
                        resultBox.className = "notfound";
                        statusElem.innerHTML = data.message;
                    } else {
                        resultBox.className = "error";

                        statusElem.innerText = "Terjadi kesalahan sistem pada respon data.";

                    }

                })

                .catch(error => {

                    loadingContainer.style.display = 'none';

                    const resultBox = document.getElementById('result-box');

                    resultBox.style.display = 'block';

                    resultBox.className = "error";

                    document.getElementById('scanned-code').innerText = decodedText;

                    document.getElementById('scan-status').innerText = "Gagal memproses data. Periksa kembali jaringan internet";

                    console.error('Error fetch:', error);

                });

        }



        function onScanError(errorMessage) {

            if(errorMessage.includes("NotFound") || errorMessage.includes("NotAllowed")) {

                errorLog.style.display = 'block';

                errorLog.innerText = "Akses Kamera Gagal: " + errorMessage;

                startBtn.classList.remove('hidden');

                startBtn.innerText = "Coba Aktifkan Kamera Lagi";

                readerWrapper.classList.add('hidden');

            }

        }



        document.getElementById('reset-btn').addEventListener('click', () => {

            location.reload();

        });

    </script>

</body>

</html>

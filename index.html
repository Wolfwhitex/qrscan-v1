<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Scanner Google Sheets</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; display: flex; flex-direction: column; items-center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: white; padding: 25px; rounded-radius: 16px; shadow-box: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-radius: 16px; }
        h1 { font-size: 1.25rem; font-weight: bold; color: #1f2937; margin-top: 0; margin-bottom: 5px; }
        p.subtitle { font-size: 0.875rem; color: #6b7280; margin-bottom: 20px; }
        #reader { width: 100%; aspect-ratio: 1/1; background-color: black; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #d1d5db; }
        #start-camera-btn { background-color: #2563eb; color: white; border: none; padding: 12px 20px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; margin-bottom: 15px; }
        #start-camera-btn:hover { background-color: #1d4ed8; }
        .hidden { display: none !important; }
        #loading-msg { color: #2563eb; font-weight: 600; margin: 15px 0; display: none; }
        #result-box { text-align: left; padding: 15px; border-radius: 12px; border: 1px solid; display: none; margin-top: 15px;}
        #result-box.success { background-color: #ecfdf5; border-color: #a7f3d0; color: #065f46; }
        #result-box.already { background-color: #fef2f2; border-color: #fecaca; color: #991b1b; }
        #result-box.notfound { background-color: #fffbeb; border-color: #fde68a; color: #92400e; }
        #result-box.error { background-color: #f9fafb; border-color: #d1d5db; color: #1f2937; }
        #scanned-code { font-family: monospace; font-weight: bold; font-size: 1.1rem; word-break: break-all; }
        #reset-btn { background-color: white; border: 1px solid #d1d5db; color: #1f2937; padding: 10px 15px; border-radius: 8px; width: 100%; margin-top: 15px; cursor: pointer; font-weight: 600; }
        #error-log { color: red; font-size: 0.8rem; text-align: left; background: #ffeeee; padding: 10px; border-radius: 5px; margin-top: 10px; display: none; word-break: break-all;}
    </style>
</head>
<body>

    <div class="container">
        <h1>Voucher Scanner</h1>
        <p class="subtitle">Koneksi Terhubung ke Google Sheets</p>
        
        <button id="start-camera-btn">1. Aktifkan Kamera</button>

        <div id="reader" class="hidden"></div>
        
        <div id="error-log"></div>

        <div id="loading-msg">Memeriksa Database Google Sheets...</div>

        <div id="result-box">
            <h2 style="font-size: 1rem; margin-top:0;">Hasil Scan:</h2>
            <p id="scanned-code"></p>
            <p id="scan-status" style="font-size: 0.9rem; margin-bottom:0;"></p>
            <button id="reset-btn">Scan Voucher Lain</button>
        </div>
    </div>

    <script>
        // === [WAJIB] GANTI DENGAN URL GOOGLE APPS SCRIPT KAMU ===
        const WEB_APP_URL = "PASTE_URL_APPS_SCRIPT_KAMU_DISINI";

        // Variabel global
        let html5QrCodeScanner;
        const startBtn = document.getElementById('start-camera-btn');
        const readerDiv = document.getElementById('reader');
        const errorLog = document.getElementById('error-log');

        // Fungsi untuk menyalakan kamera (Dipanggil saat tombol diklik)
        startBtn.addEventListener('click', () => {
            // Sembunyikan tombol, tampilkan kotak kamera
            startBtn.classList.add('hidden');
            readerDiv.classList.remove('hidden');
            errorLog.style.display = 'none';
            errorLog.innerText = '';

            // Inisialisasi scanner dengan konfigurasi yang lebih stabil
            html5QrCodeScanner = new Html5QrcodeScanner("reader", { 
                fps: 10, 
                qrbox: {width: 250, height: 250},
                // Mencoba memprioritaskan kamera belakang
                rememberLastUsedCamera: true,
                supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
            });
            
            // Jalankan scanner
            html5QrCodeScanner.render(onScanSuccess, onScanError);
        });

        // Fungsi jika scan QR berhasil
        function onScanSuccess(decodedText) {
            // Matikan scanner agar tidak scan berkali-kali
            html5QrCodeScanner.clear();
            
            // Tampilkan loading, sembunyikan kotak kamera
            document.getElementById('loading-msg').style.display = 'block';
            readerDiv.classList.add('hidden');

            // Kirim ke Google Sheets
            fetch(`${WEB_APP_URL}?code=${encodeURIComponent(decodedText)}`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('loading-msg').style.display = 'none';
                    const resultBox = document.getElementById('result-box');
                    const scannedCodeElem = document.getElementById('scanned-code');
                    const statusElem = document.getElementById('scan-status');

                    resultBox.style.display = 'block';
                    scannedCodeElem.innerText = decodedText;

                    // Atur warna dan pesan berdasarkan respon API
                    if (data.status === "SUCCESS") {
                        resultBox.className = "success";
                        statusElem.innerHTML = data.message;
                    } else if (data.status === "ALREADY_REDEEMED") {
                        resultBox.className = "already";
                        statusElem.innerHTML = data.message;
                    } else if (data.status === "NOT_FOUND") {
                        resultBox.className = "notfound";
                        statusElem.innerHTML = data.message;
                    } else {
                        resultBox.className = "error";
                        statusElem.innerText = "Terjadi kesalahan respon server.";
                    }
                })
                .catch(error => {
                    document.getElementById('loading-msg').style.display = 'none';
                    const resultBox = document.getElementById('result-box');
                    resultBox.style.display = 'block';
                    resultBox.className = "error";
                    document.getElementById('scanned-code').innerText = decodedText;
                    document.getElementById('scan-status').innerText = "Gagal terhubung ke database. Cek koneksi internet atau URL App Script.";
                    console.error('Error fetch:', error);
                });
        }

        // Fungsi jika library scanner gagal inisialisasi/error kamera
        function onScanError(errorMessage) {
            // Jangan tampilkan error di log untuk setiap frame gagal deteksi QR,
            // tapi tampilkan jika ada error fatal (misal kamera tidak ditemukan)
            if(errorMessage.includes("NotFound") || errorMessage.includes("NotAllowed")) {
                errorLog.style.display = 'block';
                errorLog.innerText = "Error Kamera: " + errorMessage;
                startBtn.classList.remove('hidden'); // Munculkan tombol start lagi
                startBtn.innerText = "Coba Aktifkan Kamera Lagi";
                readerDiv.classList.add('hidden'); // Sembunyikan kotak hitam
            }
        }

        // Tombol Reset untuk scan ulang
        document.getElementById('reset-btn').addEventListener('click', () => {
            location.reload();
        });
    </script>
</body>
</html>

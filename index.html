<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tes Kamera Dasar</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding: 20px;">
    <h1>Tes Akses Kamera</h1>
    <button id="start-btn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">
        Klik untuk Buka Kamera
    </button>
    <br><br>
    <video id="video" width="100%" max-width="400px" autoplay playsinline style="background: #ccc; border-radius: 8px;"></video>
    <p id="error-log" style="color: red; font-weight: bold;"></p>

    <script>
        const video = document.getElementById('video');
        const startBtn = document.getElementById('start-btn');
        const errorLog = document.getElementById('error-log');

        startBtn.addEventListener('click', async () => {
            errorLog.innerText = "Meminta izin kamera...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                errorLog.style.color = "green";
                errorLog.innerText = "Kamera Berhasil Diakses!";
            } catch (err) {
                errorLog.style.color = "red";
                errorLog.innerText = "Error: " + err.name + " - " + err.message;
                console.error(err);
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voucher Scanner Google Sheets</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen p-4">

    <div class="bg-white p-6 rounded-2xl shadow-lg w-full max-w-md text-center">
        <h1 class="text-xl font-bold text-gray-800 mb-2">Voucher Scanner</h1>
        <p class="text-sm text-gray-500 mb-4">Koneksi Terhubung ke Google Sheets</p>
        
        <div id="reader" class="overflow-hidden rounded-lg border border-gray-300 bg-black aspect-square mb-4"></div>
        
        <div id="loading" class="hidden text-blue-600 font-semibold my-4 animate-pulse">
            Memeriksa Database Google Sheets...
        </div>

        <div id="result-box" class="hidden p-4 rounded-xl text-left border">
            <h2 class="font-semibold text-gray-700">Hasil Scan:</h2>
            <p id="scanned-code" class="text-lg font-mono font-bold text-gray-900 my-1 break-all"></p>
            <p id="scan-status" class="text-sm font-medium mt-2"></p>
        </div>
    </div>

    <script>
        // === GANTI DENGAN URL GOOGLE APPS SCRIPT KAMU ===
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxnH54T-Ni8BIvh1vZ1PHg54_UcfRyDHsKDB2b8aHCXRGqXuuf3bjoxmspLUJHiohi2PA/exec";

        function onScanSuccess(decodedText, decodedResult) {
            // Hentikan scanner sementara agar tidak scan berkali-kali
            html5QrcodeScanner.clear();
            
            const loading = document.getElementById('loading');
            const resultBox = document.getElementById('result-box');
            const scannedCodeElement = document.getElementById('scanned-code');
            const statusElement = document.getElementById('scan-status');

            // Tampilkan loading & Kode ter-scan
            loading.classList.remove('hidden');
            resultBox.classList.add('hidden');
            
            // Tembak data ke Google Sheets menggunakan API Web App
            fetch(`${WEB_APP_URL}?code=${encodeURIComponent(decodedText)}`)
                .then(response => response.json())
                .then(data => {
                    loading.classList.add('hidden');
                    resultBox.classList.remove('hidden');
                    scannedCodeElement.innerText = decodedText;

                    if (data.status === "SUCCESS") {
                        resultBox.className = "p-4 rounded-xl text-left border bg-green-50 border-green-300 mt-4";
                        statusElement.className = "text-sm font-medium text-green-700";
                        statusElement.innerHTML = data.message;
                    } else if (data.status === "ALREADY_REDEEMED") {
                        resultBox.className = "p-4 rounded-xl text-left border bg-red-50 border-red-300 mt-4";
                        statusElement.className = "text-sm font-medium text-red-700";
                        statusElement.innerHTML = data.message;
                    } else {
                        resultBox.className = "p-4 rounded-xl text-left border bg-yellow-50 border-yellow-300 mt-4";
                        statusElement.className = "text-sm font-medium text-yellow-700";
                        statusElement.innerHTML = data.message;
                    }

                    // Tambahkan tombol untuk scan ulang
                    bikinTombolReset(resultBox);
                })
                .catch(error => {
                    loading.classList.add('hidden');
                    resultBox.classList.remove('hidden');
                    resultBox.className = "p-4 rounded-xl text-left border bg-gray-50 border-gray-300 mt-4";
                    statusElement.className = "text-sm font-medium text-red-600";
                    statusElement.innerText = "Gagal terhubung ke database. Periksa koneksi internet atau URL App Script.";
                    bikinTombolReset(resultBox);
                });
        }

        function bikinTombolReset(container) {
            if (container.querySelectorAll('button').length === 0) {
                const resetBtn = document.createElement('button');
                resetBtn.className = "mt-4 w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition cursor-pointer";
                resetBtn.innerText = "Scan Voucher Lain";
                resetBtn.onclick = () => location.reload();
                container.appendChild(resetBtn);
            }
        }

        // Jalankan Scanner Otomatis
        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);
    </script>
</body>
</html>
